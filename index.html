<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>AK Chit Funds - Admin Portal v4.3</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --bg-dark:#0a0e1a; --card-bg:#141b2d; --input-bg:#1c253b; --accent-gold:linear-gradient(90deg,#ff9800,#f57c00); --text-main:#ffffff; --text-dim:#8e9aaf; --border:#252f48; }
        body { background-color:var(--bg-dark); color:var(--text-main); font-family:'Segoe UI',sans-serif; padding-bottom:120px; }
        .stat-card { background:var(--card-bg); border:1px solid var(--border); border-radius:15px; padding:15px; text-align:center; }
        .stat-num { font-size:1.3rem; font-weight:bold; display:block; }
        .stat-label { font-size:0.65rem; color:var(--text-dim); text-transform:uppercase; }
        .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.92); z-index:2000; padding:20px; overflow-y:auto; }
        .modal-content-custom { background:var(--card-bg); border-radius:25px; padding:25px; max-width:450px; margin:20px auto; border:1px solid var(--border); }
        .form-input { background:var(--input-bg); border:1px solid var(--border); color:white; padding:12px; border-radius:12px; width:100%; margin-bottom:12px; }
        .nav-bar { position:fixed; bottom:0; width:100%; background:#070b14; display:flex; justify-content:space-around; padding:12px 0; border-top:1px solid var(--border); z-index:1000; }
        .nav-item { cursor:pointer; text-align:center; font-size:0.62rem; color:var(--text-dim); }
        .nav-item.active { color:#f39c12; }
        .tab-content { display:none; } .tab-content.active { display:block; }
        .suggestions-list { position:absolute; width:100%; background:var(--input-bg); border:1px solid var(--border); z-index:3000; max-height:200px; overflow-y:auto; display:none; }
        .suggestion-item { padding:12px; cursor:pointer; border-bottom:1px solid rgba(255,255,255,0.05); }
        .table-custom { color:white; font-size:0.7rem; width:100%; border-collapse:collapse; }
        .table-custom th { color:var(--text-dim); border-bottom:1px solid var(--border); padding:8px 5px; text-transform:uppercase; }
        .table-custom td { padding:9px 5px; border-bottom:1px solid rgba(255,255,255,0.05); }
        .avatar { width:40px; height:40px; background:var(--accent-gold); color:black; border-radius:10px; display:flex; align-items:center; justify-content:center; font-weight:bold; }
    </style>
</head>
<body>

<div class="container py-2">
    <div class="d-flex justify-content-between align-items-center p-3">
        <div style="color:#f39c12; font-weight:bold; font-size:1.2rem;">🏆 AK CHIT FUNDS</div>
        <button onclick="location.reload()" class="btn btn-sm btn-outline-danger">Logout</button>
    </div>

    <div id="homeTab" class="tab-content active">
        <div class="row g-2 mt-2 text-center">
            <div class="col-4"><div class="stat-card"><span class="stat-num" id="memberCount">0</span><span class="stat-label">Members</span></div></div>
            <div class="col-4"><div class="stat-card"><span class="stat-num" id="groupCount">0</span><span class="stat-label">Groups</span></div></div>
            <div class="col-4"><div class="stat-card"><span class="stat-num text-success" id="todayColl">₹0</span><span class="stat-label">Today</span></div></div>
        </div>

        <button class="btn btn-warning w-100 py-3 fw-bold mt-3" onclick="openModal('paymentModal')" style="border-radius:20px;">💳 Record Payment</button>

        <div class="p-3 my-3" style="background:var(--card-bg); border-radius:20px; border:1px solid var(--border); position: relative;">
            <input type="text" id="summarySearch" class="form-input" placeholder="🔍 Search Member for Ledger..." oninput="handleSearch(this.value)">
            <div id="summaryList" class="suggestions-list"></div>
            <div id="ledgerData" class="mt-3"></div>
        </div>

        <div class="d-flex gap-2">
            <button class="btn btn-outline-warning w-100 py-3 fw-bold" onclick="openModal('memberModal')">👤 Create Member</button>
            <button class="btn btn-outline-success w-100 py-3 fw-bold" onclick="openModal('groupModal')">🏦 New Group</button>
        </div>
    </div>

    <div id="groupsTab" class="tab-content">
        <h5 class="p-3">📁 Group Management</h5>
        <div id="groupListArea" class="px-3"></div>
    </div>
    
    <div id="backupTab" class="tab-content">
        <h5 class="mt-4 text-center">💾 Data Backup</h5>
        <div class="stat-card p-4 mt-3 mx-3">
            <button class="btn btn-warning w-100 py-3 mb-2" onclick="exportFullBackup()">Download JSON</button>
            <button class="btn btn-success w-100 py-3" onclick="exportToExcel()">Export Excel (.xlsx)</button>
        </div>
    </div>
</div>

<nav class="nav-bar">
    <div class="nav-item active" onclick="switchTab('home', this)">🏠<br>Home</div>
    <div class="nav-item" onclick="switchTab('groups', this)">📁<br>Groups</div>
    <div class="nav-item" onclick="switchTab('backup', this)">💾<br>Backup</div>
</nav>

<div id="paymentModal" class="modal-overlay">
    <div class="modal-content-custom">
        <h5 class="mb-3">Record Payment</h5>
        <input type="date" id="pDate" class="form-input">
        <select id="pMember" class="form-input" onchange="updateGroupDropdown()"></select>
        <select id="pGroup" class="form-input"></select>
        <input type="number" id="pPaid" class="form-input" placeholder="Amount Paid ₹">
        <select id="pPicked" class="form-input">
            <option value="No">Chit Picked: No</option>
            <option value="Yes">Chit Picked: Yes ✅</option>
        </select>
        <button class="btn btn-warning w-100 py-3 fw-bold" onclick="savePayment()">Sync Payment</button>
        <button class="btn btn-link w-100 text-white" onclick="closeModal('paymentModal')">Cancel</button>
    </div>
</div>

<div id="memberModal" class="modal-overlay">
    <div class="modal-content-custom">
        <h5>New Member</h5>
        <input type="text" id="mName" class="form-input" placeholder="Full Name">
        <input type="tel" id="mPhone" class="form-input" placeholder="Phone Number">
        <select id="mGroup" class="form-input"></select>
        <input type="number" id="mQty" class="form-input" value="1" placeholder="Quantity">
        <button class="btn btn-warning w-100 py-3 fw-bold" onclick="createMember()">Create</button>
        <button class="btn btn-link w-100 text-white" onclick="closeModal('memberModal')">Cancel</button>
    </div>
</div>

<div id="groupModal" class="modal-overlay">
    <div class="modal-content-custom">
        <h5>New Group</h5>
        <input type="text" id="gName" class="form-input" placeholder="Group Name (e.g. 5L V3)">
        <input type="number" id="gDuration" class="form-input" placeholder="Duration (Months)">
        <button class="btn btn-success w-100 py-3 fw-bold" onclick="createGroup()">Create Group</button>
        <button class="btn btn-link w-100 text-white" onclick="closeModal('groupModal')">Cancel</button>
    </div>
</div>

<script>
const firebaseConfig={apiKey:"AIzaSyCqb7gAbpa3UabPU3g_YhNITuPWtWPY4KU",authDomain:"ak-events-2016.firebaseapp.com",projectId:"ak-events-2016",appId:"1:78066764444:web:5bb9e0d48c128a8632fb59"};
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();
let _cache = { m: [], g: [], p: [] };

async function sync() {
    const [m, g, p] = await Promise.all([
        db.collection('members').get(),
        db.collection('groups').get(),
        db.collection('payments').get()
    ]);
    _cache.m = m.docs.map(d => ({id:d.id, ...d.data()}));
    _cache.g = g.docs.map(d => ({id:d.id, ...d.data()}));
    _cache.p = p.docs.map(d => ({id:d.id, ...d.data()}));
    
    document.getElementById('memberCount').innerText = _cache.m.length;
    document.getElementById('groupCount').innerText = _cache.g.length;
    
    const today = new Date().toISOString().split('T')[0];
    const coll = _cache.p.filter(x => x.date === today).reduce((s, x) => s + (parseFloat(x.paid) || 0), 0);
    document.getElementById('todayColl').innerText = '₹' + coll.toLocaleString();
    
    if(document.getElementById('groupsTab').classList.contains('active')) renderGroupsTab();
}

function switchTab(t, el) {
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    document.getElementById(t+'Tab').classList.add('active');
    el.classList.add('active');
    if(t === 'groups') renderGroupsTab();
}

function handleSearch(val) {
    const list = document.getElementById('summaryList');
    if (!val || val.length < 1) { list.style.display = 'none'; return; }
    const filtered = _cache.m.filter(m => m.name.toLowerCase().includes(val.toLowerCase()));
    list.innerHTML = filtered.map(m => `<div class="suggestion-item" onclick="selectMember('${m.id}','${m.name}')">${m.name}</div>`).join('');
    list.style.display = 'block';
}

function selectMember(id, name) {
    document.getElementById('summarySearch').value = name;
    document.getElementById('summaryList').style.display = 'none';
    const mPays = _cache.p.filter(p => p.memberId === id);
    document.getElementById('ledgerData').innerHTML = `
        <div class="stat-card mt-3">
            <div class="d-flex align-items-center gap-3 mb-3">
                <div class="avatar">${name[0]}</div>
                <h6 class="mb-0">${name}</h6>
            </div>
            <table class="table-custom w-100">
                <thead><tr><th>Date</th><th>Paid</th><th>Picked</th></tr></thead>
                <tbody>${mPays.map(p => `<tr><td>${p.date}</td><td class="text-success">₹${p.paid}</td><td>${p.picked||'No'}</td></tr>`).join('')}</tbody>
            </table>
        </div>`;
}

function renderGroupsTab() {
    const area = document.getElementById('groupListArea');
    area.innerHTML = _cache.g.map(g => {
        const members = _cache.m.filter(m => m.groupId === g.id);
        return `
        <div class="stat-card mb-3 text-start">
            <h6 class="text-warning">${g.name}</h6>
            <small class="text-dim">${members.length} Members Enrolled</small>
            <div class="mt-2" style="font-size:0.7rem">
                ${members.map(m => `• ${m.name} (Qty: ${m.quantity || 1})`).join('<br>')}
            </div>
        </div>`;
    }).join('');
}

async function savePayment() {
    const data = {
        memberId: document.getElementById('pMember').value,
        groupId: document.getElementById('pGroup').value,
        paid: parseFloat(document.getElementById('pPaid').value) || 0,
        picked: document.getElementById('pPicked').value,
        date: document.getElementById('pDate').value
    };
    if(!data.memberId) return alert("Select Member");
    await db.collection('payments').add(data);
    closeModal('paymentModal');
    sync();
}

async function createMember() {
    const name = document.getElementById('mName').value;
    const gid = document.getElementById('mGroup').value;
    if(!name || !gid) return alert("Missing Info");
    await db.collection('members').add({ name, phone: document.getElementById('mPhone').value, groupId: gid, quantity: document.getElementById('mQty').value });
    closeModal('memberModal'); sync();
}

async function createGroup() {
    const name = document.getElementById('gName').value;
    if(!name) return;
    await db.collection('groups').add({ name, duration: document.getElementById('gDuration').value });
    closeModal('groupModal'); sync();
}

function updateGroupDropdown() {
    const m = _cache.m.find(x => x.id === document.getElementById('pMember').value);
    const gSel = document.getElementById('pGroup');
    const g = _cache.g.find(x => x.id === (m ? m.groupId : ''));
    gSel.innerHTML = g ? `<option value="${g.id}">${g.name}</option>` : '<option>No Group</option>';
}

function openModal(id) { 
    if(id === 'paymentModal') {
        document.getElementById('pMember').innerHTML = '<option value="">Select Member</option>' + _cache.m.map(m => `<option value="${m.id}">${m.name}</option>`).join('');
        document.getElementById('pDate').value = new Date().toISOString().split('T')[0];
    }
    if(id === 'memberModal') {
        document.getElementById('mGroup').innerHTML = _cache.g.map(g => `<option value="${g.id}">${g.name}</option>`).join('');
    }
    document.getElementById(id).style.display = 'block'; 
}

function closeModal(id) { document.getElementById(id).style.display = 'none'; }

// Init
sync();
</script>
</body>
</html>
