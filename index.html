<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>AK Chit Funds - Cloud Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --bg-dark:#0a0e1a; --card-bg:#141b2d; --input-bg:#1c253b; --accent-gold:linear-gradient(90deg,#ff9800,#f57c00); --text-main:#ffffff; --text-dim:#8e9aaf; --border:#252f48; }
        * { box-sizing:border-box; }
        body { background-color:var(--bg-dark); color:var(--text-main); font-family:'Segoe UI',sans-serif; padding-bottom:120px; }
        .app-header { display:flex; justify-content:space-between; align-items:center; padding:16px 20px; border-bottom:1px solid var(--border); background:var(--card-bg); }
        .brand { color:#f39c12; font-weight:bold; font-size:1.3rem; }
        .stat-card { background:var(--card-bg); border:1px solid var(--border); border-radius:15px; padding:15px; text-align:center; }
        .stat-num { font-size:1.3rem; font-weight:bold; display:block; }
        .stat-label { font-size:0.65rem; color:var(--text-dim); text-transform:uppercase; }
        .modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.92); z-index:2000; padding:20px; overflow-y:auto; }
        .modal-content-custom { background:var(--card-bg); border-radius:25px; padding:25px; max-width:450px; margin:20px auto; border:1px solid var(--border); }
        .form-input { background:var(--input-bg); border:1px solid var(--border); color:white; padding:12px; border-radius:12px; width:100%; margin-bottom:12px; font-size:0.9rem; }
        .btn-save { background:var(--accent-gold); color:black; border:none; width:100%; padding:14px; border-radius:14px; font-weight:bold; margin-bottom:10px; cursor:pointer; }
        .btn-cancel { background:var(--input-bg); color:white; border:none; width:100%; padding:12px; border-radius:14px; cursor:pointer; }
        .nav-bar { position:fixed; bottom:0; width:100%; background:#070b14; display:flex; justify-content:space-around; padding:12px 0; border-top:1px solid var(--border); z-index:1000; }
        .nav-item { cursor:pointer; text-align:center; font-size:0.65rem; color:var(--text-dim); }
        .nav-item.active { color:#f39c12; font-weight:bold; }
        .tab-content { display:none; } .tab-content.active { display:block; }
        .table-custom { color:white; font-size:0.7rem; width:100%; border-collapse:collapse; }
        .table-custom th { color:var(--text-dim); border-bottom:1px solid var(--border); padding:8px 5px; text-transform:uppercase; }
        .table-custom td { padding:9px 5px; border-bottom:1px solid rgba(255,255,255,0.05); }
        .suggestions-list { position:absolute; top:100%; left:0; right:0; background:var(--input-bg); border:1px solid var(--border); z-index:3000; max-height:200px; overflow-y:auto; display:none; }
        .suggestion-item { padding:12px; cursor:pointer; border-bottom:1px solid rgba(255,255,255,0.05); }
        #loginScreen { position:fixed; inset:0; background:var(--bg-dark); z-index:9000; display:flex; align-items:center; justify-content:center; padding:20px; }
        .login-card { background:var(--card-bg); border:1px solid var(--border); border-radius:28px; padding:32px; width:100%; max-width:400px; text-align:center; }
    </style>
</head>
<body>

<div id="loginScreen">
    <div class="login-card">
        <img src="logo.png" style="width: 120px; height: auto; margin-bottom: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);" onerror="this.src='https://via.placeholder.com/120?text=AK'">
        <div style="font-size:1.6rem; font-weight:900; color:#f39c12;">AK Chit Funds</div>
        <div style="font-size:0.75rem; color:var(--text-dim); margin-bottom:20px;">Portal Login</div>
        <div style="display:flex; gap:8px;">
            <span style="background:var(--input-bg); border:1px solid var(--border); color:var(--text-dim); padding:12px; border-radius:12px;">+91</span>
            <input type="tel" id="loginPhone" class="form-input" style="margin-bottom:0;" placeholder="0987654321" maxlength="10">
        </div>
        <button class="btn-save mt-3" onclick="handleLoginSubmit()">🔐 Continue</button>
    </div>
</div>

<div class="container py-2">
    <div id="adminHeader" class="app-header">
        <div style="display: flex; align-items: center;">
            <img src="logo.png" style="height: 80px; width: auto; margin-right: 12px; border-radius: 5px;" onerror="this.style.display='none'">
            <div class="brand">AK Chit Funds <small style="font-size:0.5em;color:#2ecc71;">☁ CLOUD</small></div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
            <button id="accessReqBtn" onclick="openAccessRequests()" style="display:inline-flex; background:rgba(243,156,18,.12); border:1px solid rgba(243,156,18,.3); color:#f39c12; border-radius:10px; padding:5px 10px; font-size:0.75rem; position:relative;">
                🔐 Requests <span id="pendingCount" style="display:none; background:#ef4444; color:white; border-radius:50%; width:16px; height:16px; font-size:0.55rem; position:absolute; top:-5px; right:-5px; align-items:center; justify-content:center;">0</span>
            </button>
            <button id="logoutBtn" onclick="handleLogout()" style="background:rgba(239,68,68,.12); border:1px solid rgba(239,68,68,.3); color:#f87171; border-radius:10px; padding:5px 10px; font-size:0.75rem;">⏻ Logout</button>
        </div>
    </div>

    <div id="memberHeader" style="display:none; padding:15px;">
        <div style="background:var(--card-bg); border:1px solid var(--border); border-radius:20px; padding:15px; display:flex; align-items:center; justify-content:space-between;">
           <div>
               <div id="memberHeaderName" style="font-weight:bold; color:#f39c12;"></div>
               <div id="memberHeaderPhone" style="font-size:0.7rem; color:var(--text-dim);"></div>
           </div>
           <button onclick="handleLogout()" class="btn btn-sm btn-outline-danger">Logout</button>
        </div>
    </div>

    <div id="homeTab" class="tab-content active">
        <div class="row g-2 mt-3 text-center" id="adminStats">
            <div class="col-4"><div class="stat-card"><span class="stat-num" id="memberCount">0</span><span class="stat-label">Members</span></div></div>
            <div class="col-4"><div class="stat-card"><span class="stat-num" id="groupCount">0</span><span class="stat-label">Groups</span></div></div>
            <div class="col-4"><div class="stat-card"><span class="stat-num text-success" id="todayColl">₹0</span><span class="stat-label">Today</span></div></div>
        </div>

        <div id="ledgerContainer" class="p-3 my-3" style="background:var(--card-bg); border-radius:20px; border:1px solid var(--border); position: relative;">
            <input type="text" id="summarySearch" class="form-input" placeholder="🔍 Search Member Ledger..." oninput="filterSearch(this.value)">
            <div id="summaryList" class="suggestions-list"></div>
            <div id="ledgerData" class="mt-3"></div>
        </div>
    </div>

    <div id="groupsTab" class="tab-content">
        <div id="groupListArea" class="mt-3 p-3"></div>
    </div>

    <div id="backupTab" class="tab-content">
        <div class="stat-card p-4 mt-5">
            <button class="btn btn-warning w-100 py-3 mb-2" onclick="exportFullBackup()">💾 Backup JSON</button>
            <button class="btn btn-success w-100 py-3" onclick="exportToExcel()">📊 Export Excel</button>
        </div>
    </div>
</div>

<div class="nav-bar" id="footerNav">
    <div class="nav-item active" onclick="switchTab('home', this)">🏠<br>Home</div>
    <div class="nav-item" onclick="switchTab('groups', this)">📁<br>Groups</div>
    <div class="nav-item" onclick="switchTab('backup', this)">💾<br>Backup</div>
</div>

<script>
const firebaseConfig={apiKey:"AIzaSyCqb7gAbpa3UabPU3g_YhNITuPWtWPY4KU",authDomain:"ak-events-2016.firebaseapp.com",projectId:"ak-events-2016",appId:"1:78066764444:web:5bb9e0d48c128a8632fb59"};
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();
const ADMIN_PHONE = '0987654321';
let CURRENT_USER = null;
let _cache = { m: [], g: [], p: [] };

async function sync() {
    const [m, g, p] = await Promise.all([db.collection('members').get(), db.collection('groups').get(), db.collection('payments').get()]);
    _cache.m = m.docs.map(d=>({id:d.id,...d.data()}));
    _cache.g = g.docs.map(d=>({id:d.id,...d.data()}));
    _cache.p = p.docs.map(d=>({id:d.id,...d.data()}));
    updateUI();
}

function applyUserSession(user) {
    document.getElementById('loginScreen').style.display = 'none';
    if(user.role === 'admin') {
        document.getElementById('adminHeader').style.display = 'flex';
        document.getElementById('memberHeader').style.display = 'none';
        document.getElementById('adminStats').style.display = 'flex';
        document.getElementById('footerNav').style.display = 'flex';
    } else {
        document.getElementById('adminHeader').style.display = 'none';
        document.getElementById('memberHeader').style.display = 'block';
        document.getElementById('adminStats').style.display = 'none';
        document.getElementById('footerNav').style.display = 'none';
        document.getElementById('memberHeaderName').innerText = user.name;
        document.getElementById('memberHeaderPhone').innerText = user.phone;
    }
    sync();
}

async function handleLoginSubmit() {
    const phone = document.getElementById('loginPhone').value.trim();
    if(phone === ADMIN_PHONE) {
        const user = {phone, role:'admin', name:'Admin'};
        sessionStorage.setItem('akdf_session', JSON.stringify(user));
        applyUserSession(user);
    } else {
        const members = await db.collection('members').get();
        const matched = members.docs.find(d => d.data().phone === phone);
        if(matched) {
            const user = {phone, role:'member', name: matched.data().name, id: matched.id};
            sessionStorage.setItem('akdf_session', JSON.stringify(user));
            applyUserSession(user);
        } else { alert("Not registered"); }
    }
}

function initAuth() {
    const saved = sessionStorage.getItem('akdf_session');
    if(saved) applyUserSession(JSON.parse(saved));
    else document.getElementById('loginScreen').style.display = 'flex';
}

function updateUI() {
    document.getElementById('memberCount').innerText = _cache.m.length;
    document.getElementById('groupCount').innerText = _cache.g.length;
}

function handleLogout() { sessionStorage.clear(); location.reload(); }

function switchTab(t, el) {
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    document.getElementById(t+'Tab').classList.add('active');
    el.classList.add('active');
}

document.addEventListener('DOMContentLoaded', initAuth);
</script>
</body>
</html>
