<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AK Chit Funds - Admin Portal v3.0</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --bg-dark:#0a0e1a; --card-bg:#141b2d; --input-bg:#1c253b; --accent-gold:linear-gradient(90deg,#ff9800,#f57c00); --text-main:#ffffff; --text-dim:#8e9aaf; --border:#252f48; }
        body { background-color:var(--bg-dark); color:var(--text-main); font-family:'Segoe UI',sans-serif; padding-bottom:120px; }
        
        /* DOUBLED LOGO */
        .brand { display:flex; align-items:center; gap:15px; color:#f39c12; font-weight:bold; font-size:1.6rem; }
        .brand-logo { font-size:3.5rem !important; line-height: 1; }

        .app-header { display:flex; justify-content:space-between; align-items:center; padding:16px 20px; border-bottom:1px solid var(--border); }
        .nav-bar { position:fixed; bottom:0; width:100%; background:#070b14; display:flex; justify-content:space-around; padding:12px 0; border-top:1px solid var(--border); z-index:1000; }
        .nav-item { cursor:pointer; text-align:center; font-size:0.65rem; color:var(--text-dim); }
        .nav-item.active { color:#f39c12; }
        .tab-content { display:none; }
        .tab-content.active { display:block; }

        /* THE PROFESSIONAL TABLE FROM YOUR SCREENSHOT */
        .table-custom { color:white; font-size:0.75rem; width:100%; border-collapse:collapse; margin-top:15px; }
        .table-custom th { background: #1c253b; color: #f39c12; border: 1px solid var(--border); padding:10px 5px; text-transform:uppercase; text-align:center; }
        .table-custom td { padding:10px 5px; border: 1px solid var(--border); text-align:center; }
        .form-input { background:var(--input-bg); border:1px solid var(--border); color:white; padding:12px; border-radius:12px; width:100%; margin-bottom:12px; }
        .btn-save { background:var(--accent-gold); color:black; border:none; width:100%; padding:14px; border-radius:14px; font-weight:bold; cursor:pointer; }
        
        @media print {
            body * { visibility: hidden; }
            #printOverlay, #printOverlay * { visibility: visible; color: black !important; }
            #printOverlay { position: absolute; left: 0; top: 0; width: 100%; }
            .no-print { display: none !important; }
        }
    </style>
</head>
<body>
<div id="loginScreen" style="position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg-dark); z-index:9000; display:flex; align-items:center; justify-content:center;">
    <div style="background:var(--card-bg); border:1px solid var(--border); border-radius:28px; padding:32px; width:100%; max-width:400px; text-align:center;">
        <div class="brand-logo">🏆</div>
        <h2 style="color:#f39c12; font-weight:900;">AK Chit Funds</h2>
        <input type="tel" id="loginPhone" class="form-input mt-4" placeholder="10-digit mobile" maxlength="10">
        <button class="btn-save" onclick="handleLoginSubmit()">🔐 Continue</button>
    </div>
</div>

<div class="container py-2">
    <div class="app-header">
        <div class="brand"><div class="brand-logo">🏆</div><span>AK CHIT FUNDS</span></div>
        <button onclick="handleLogout()" style="background:none; border:none; color:#f87171;">⏻ Logout</button>
    </div>

    <div id="homeTab" class="tab-content active">
        <div class="row g-2 mt-3 text-center">
            <div class="col-6"><div style="background:var(--card-bg); padding:15px; border-radius:15px;"><span id="mCount">0</span><br><small>Members</small></div></div>
            <div class="col-6"><div style="background:var(--card-bg); padding:15px; border-radius:15px;"><span id="gCount">0</span><br><small>Groups</small></div></div>
        </div>
        <div class="d-flex gap-2 mt-3">
            <button class="btn btn-warning w-50" onclick="openModal('memberModal')">+ New Member</button>
            <button class="btn btn-outline-warning w-50" onclick="openModal('groupModal')">+ New Group</button>
        </div>
    </div>

    <div id="listTab" class="tab-content">
        <div class="p-3 mt-4" style="background:var(--card-bg); border:1px solid var(--border); border-radius:18px;">
            <h6 style="color:#f39c12;">📋 Chit Planner (Calculation Mode)</h6>
            <div class="row g-2">
                <input type="text" id="ncp_name" class="form-input" placeholder="Group Name">
                <input type="number" id="ncp_amount" class="form-input" placeholder="Chit Value (e.g. 100000)">
                <input type="number" id="ncp_members" class="form-input" placeholder="Members (e.g. 20)">
                <input type="number" id="ncp_comm" class="form-input" placeholder="Commission % (e.g. 5)" value="5">
                <input type="text" id="ncp_upi" class="form-input" placeholder="Your UPI ID (8121723153@ybl)">
            </div>
            <button class="btn-save" onclick="ncpCalculateFull()">⚡ Generate Full Schedule</button>
            <div id="ncp_result_area" class="mt-3 overflow-auto"></div>
            <button id="btnPrint" class="btn btn-outline-light w-100 mt-2" onclick="window.print()" style="display:none;">🖨️ Print Detailed PDF</button>
        </div>
    </div>

    <div id="backupTab" class="tab-content">
        <div class="p-4 mt-3 text-center" style="background:var(--card-bg); border-radius:20px;">
            <button class="btn btn-outline-success w-100 mb-2 py-3" onclick="exportToExcel()">📊 Export to Excel (.xlsx)</button>
            <button class="btn btn-outline-warning w-100 py-3" onclick="exportFullBackup()">💾 Download JSON Backup</button>
        </div>
    </div>
</div>
<div class="nav-bar">
    <div class="nav-item active" onclick="switchTab('home')">🏠<br>Home</div>
    <div class="nav-item" onclick="switchTab('list')">📜<br>Planner</div>
    <div class="nav-item" onclick="switchTab('backup')">💾<br>Backup</div>
</div>
<script>
    const firebaseConfig = { apiKey: "AIzaSyCqb7gAbpa3UabPU3g_YhNITuPWtWPY4KU", authDomain: "ak-events-2016.firebaseapp.com", projectId: "ak-events-2016", storageBucket: "ak-events-2016.firebasestorage.app", messagingSenderId: "78066764444", appId: "1:78066764444:web:5bb9e0d48c128a8632fb59" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function ncpCalculateFull() {
        const totalValue = parseFloat(document.getElementById('ncp_amount').value);
        const members = parseInt(document.getElementById('ncp_members').value);
        const commPerc = parseFloat(document.getElementById('ncp_comm').value) / 100;
        
        if(!totalValue || !members) return alert("Please enter Amount and Members");

        let html = `<table class="table-custom">
            <thead>
                <tr>
                    <th>Month</th>
                    <th>Chit Value</th>
                    <th>Commission</th>
                    <th>Dividend</th>
                    <th>Net Pay</th>
                </tr>
            </thead>
            <tbody>`;

        const commission = totalValue * commPerc;
        const installAmount = totalValue / members;
        
        // Logical loop to create the table rows
        for (let i = 1; i <= members; i++) {
            // Business logic for Dividend (Example: variable auction model)
            const bidAmount = (i === 1) ? commission : (totalValue * 0.10); // First month is fixed
            const dividendPerPerson = (bidAmount - commission) / members;
            const netPay = installAmount - dividendPerPerson;

            html += `<tr>
                <td>${i}</td>
                <td>₹${totalValue.toLocaleString()}</td>
                <td>₹${commission.toLocaleString()}</td>
                <td>₹${Math.round(dividendPerPerson).toLocaleString()}</td>
                <td style="color:#34d399; font-weight:bold;">₹${Math.round(netPay).toLocaleString()}</td>
            </tr>`;
        }
        
        html += `</tbody></table>`;
        document.getElementById('ncp_result_area').innerHTML = html;
        document.getElementById('btnPrint').style.display = 'block';
    }

    function switchTab(t) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.getElementById(t + 'Tab').classList.add('active');
    }

    function handleLoginSubmit() { document.getElementById('loginScreen').style.display = 'none'; }
    
    // Excel Export Logic
    function exportToExcel() {
        const wb = XLSX.utils.book_new();
        const ws = XLSX.utils.table_to_sheet(document.querySelector('.table-custom'));
        XLSX.utils.book_append_sheet(wb, ws, "Chit_Schedule");
        XLSX.writeFile(wb, "AK_Chit_Schedule.xlsx");
    }
</script>
</body>
</html>
