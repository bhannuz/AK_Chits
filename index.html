<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>AK Chit Funds - Admin Portal v3.0</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --bg-dark:#0a0e1a; --card-bg:#141b2d; --input-bg:#1c253b; --accent-gold:linear-gradient(90deg,#ff9800,#f57c00); --text-main:#ffffff; --text-dim:#8e9aaf; --border:#252f48; }
        * { box-sizing:border-box; }
        body { background-color:var(--bg-dark); color:var(--text-main); font-family:'Segoe UI',sans-serif; padding-bottom:120px; }
        .app-header { display:flex; justify-content:space-between; align-items:center; padding:16px 20px; border-bottom:1px solid var(--border); background:var(--card-bg); sticky:top; z-index:1001; }
        .brand { color:#f39c12; font-weight:bold; font-size:1.3rem; }
        .stat-card { background:var(--card-bg); border:1px solid var(--border); border-radius:15px; padding:15px; text-align:center; }
        .stat-num { font-size:1.3rem; font-weight:bold; display:block; }
        .stat-label { font-size:0.65rem; color:var(--text-dim); text-transform:uppercase; }

        /* MODALS */
        .modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.92); z-index:2000; padding:20px; overflow-y:auto; }
        .modal-content-custom { background:var(--card-bg); border-radius:25px; padding:25px; max-width:450px; margin:20px auto; border:1px solid var(--border); }
        .form-input { background:var(--input-bg); border:1px solid var(--border); color:white; padding:12px; border-radius:12px; width:100%; margin-bottom:12px; font-size:0.9rem; }
        .form-label-small { font-size:0.72rem; color:var(--text-dim); text-transform:uppercase; letter-spacing:.5px; margin-bottom:5px; display:block; }
        .btn-save { background:var(--accent-gold); color:black; border:none; width:100%; padding:14px; border-radius:14px; font-weight:bold; margin-bottom:10px; cursor:pointer; font-size:0.95rem; }
        .btn-cancel { background:var(--input-bg); color:white; border:none; width:100%; padding:12px; border-radius:14px; cursor:pointer; }
        .btn-danger-full { background:linear-gradient(135deg,#ef4444,#dc2626); color:white; border:none; width:100%; padding:12px; border-radius:14px; font-weight:700; cursor:pointer; margin-bottom:10px; }

        /* NAV */
        .nav-bar { position:fixed; bottom:0; width:100%; background:#070b14; display:flex; justify-content:space-around; padding:12px 0 calc(12px + env(safe-area-inset-bottom)); border-top:1px solid var(--border); z-index:1000; }
        .nav-item { cursor:pointer; text-align:center; font-size:0.65rem; color:var(--text-dim); padding:4px 10px; }
        .nav-item.active { color:#f39c12; font-weight: bold; }
        .tab-content { display:none; }
        .tab-content.active { display:block; }

        /* TABLES */
        .table-custom { color:white; font-size:0.7rem; width:100%; border-collapse:collapse; }
        .table-custom th { color:var(--text-dim); border-bottom:1px solid var(--border); padding:8px 5px; font-size:0.6rem; text-transform:uppercase; }
        .table-custom td { padding:9px 5px; border-bottom:1px solid rgba(255,255,255,0.05); vertical-align:middle; }
        .table-custom tr.chit-picked { background:rgba(16,185,129,0.08); border-left:3px solid #10b981; }
        .multi-month-row { background:rgba(99,102,241,0.09); border-left:3px solid #818cf8; }

        /* AUTOCOMPLETE */
        .suggestions-list { position:absolute; top:100%; left:0; right:0; background:var(--input-bg); border:1px solid var(--border); border-radius:0 0 12px 12px; z-index:3000; max-height:200px; overflow-y:auto; display:none; margin-top:-12px; }
        .suggestion-item { padding:12px; cursor:pointer; border-bottom:1px solid rgba(255,255,255,0.05); }

        /* GROUP CARDS */
        .group-card { background:var(--card-bg); border:1px solid var(--border); border-radius:16px; padding:16px; margin-bottom:14px; }
        .chevron-icon { transition:transform 0.25s ease; display:inline-block; font-size:0.8rem; color:var(--text-dim); }

        /* LOGIN SCREEN */
        #loginScreen { position:fixed; inset:0; background:var(--bg-dark); z-index:9000; display:flex; align-items:center; justify-content:center; padding:20px; }
        .login-card { background:var(--card-bg); border:1px solid var(--border); border-radius:28px; padding:32px 28px; width:100%; max-width:400px; text-align: center; }
    </style>
</head>
<body>

<div id="loginScreen">
    <div class="login-card">
        <div class="login-brand">
            <img src="logo.png" style="width: 120px; height: auto; margin-bottom: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);" onerror="this.src='https://via.placeholder.com/120?text=AK'">
            <div style="font-size:1.6rem; font-weight:900; color:#f39c12;">AK Chit Funds</div>
            <div style="font-size:0.75rem; color:var(--text-dim); margin-top:4px; margin-bottom:20px;">Enter your mobile number to continue</div>
        </div>
        <div id="loginStep1" class="login-step active">
            <div style="display:flex; gap:8px;">
                <span style="background:var(--input-bg); border:1px solid var(--border); color:var(--text-dim); padding:12px 14px; border-radius:12px; font-size:0.9rem;">+91</span>
                <input type="tel" id="loginPhone" class="form-input" style="margin-bottom:0;" placeholder="10-digit number" maxlength="10">
            </div>
            <button class="btn-save mt-3" onclick="handleLoginSubmit()">🔐 Continue</button>
        </div>
        <div id="loginStep2" class="login-step" style="display:none;">
            <div style="padding:20px; text-align:center;">
                <div style="font-size:2rem;">⏳</div>
                <div style="font-weight:bold; margin:10px 0;">Access Requested</div>
                <div style="font-size:0.8rem; color:var(--text-dim);">Waiting for admin approval...</div>
                <div id="pendingPhone" style="color:#f39c12; font-weight:bold; margin:10px 0;"></div>
                <button class="btn-cancel" onclick="goBackToLogin()">← Back</button>
            </div>
        </div>
    </div>
</div>

<div class="container py-2">
    <div id="adminHeader" class="app-header">
        <div style="display: flex; align-items: center;">
            <img src="logo.png" style="height: 60px; width: auto; margin-right: 12px; border-radius: 5px;" onerror="this.style.display='none'">
            <div class="brand">AK Chit Funds <small style="font-size:0.5em;color:#2ecc71;">☁ CLOUD</small></div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
            <button id="accessReqBtn" onclick="openAccessRequests()" style="display:inline-flex; background:rgba(243,156,18,.12); border:1px solid rgba(243,156,18,.3); color:#f39c12; border-radius:10px; padding:5px 10px; font-size:0.75rem; font-weight:700; cursor:pointer; position:relative;">
                🔐 Requests <span id="pendingCount" style="display:none; background:#ef4444; color:white; border-radius:50%; width:16px; height:16px; font-size:0.55rem; position:absolute; top:-5px; right:-5px; display:flex; align-items:center; justify-content:center;">0</span>
            </button>
            <button id="logoutBtn" onclick="handleLogout()" style="background:rgba(239,68,68,.12); border:1px solid rgba(239,68,68,.3); color:#f87171; border-radius:10px; padding:5px 10px; font-size:0.75rem; font-weight:700; cursor:pointer;">⏻ Logout</button>
        </div>
    </div>

    <div id="memberHeader" style="display:none;padding:16px 4px 0;">
        <div style="background:linear-gradient(135deg,rgba(243,156,18,.18),rgba(243,156,18,.04));border:1px solid rgba(243,156,18,.3);border-radius:22px;padding:18px 18px 14px;">
            <div style="display:flex;align-items:center;gap:14px;margin-bottom:12px;">
                <div id="memberHeaderAvatar" style="width:52px;height:52px;border-radius:16px;background:var(--accent-gold);color:black;display:flex;align-items:center;justify-content:center;font-size:1.3rem;font-weight:900;"></div>
                <div style="flex:1;">
                    <div style="font-size:0.65rem;color:var(--text-dim);">Welcome back 👋</div>
                    <div id="memberHeaderName" style="font-size:1.15rem;font-weight:900;color:#f39c12;"></div>
                    <div id="memberHeaderPhone" style="font-size:0.72rem;color:var(--text-dim);"></div>
                </div>
                <button onclick="handleLogout()" style="background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);color:#f87171;border-radius:10px;padding:8px 12px;font-size:0.75rem;font-weight:700;cursor:pointer;">⏻</button>
            </div>
        </div>
    </div>

    <div id="homeTab" class="tab-content active">
        <div id="adminStatCards" class="row g-2 mt-3 text-center">
            <div class="col-4"><div class="stat-card"><span class="stat-num" id="memberCount">-</span><span class="stat-label">Members</span></div></div>
            <div class="col-4"><div class="stat-card"><span class="stat-num" id="groupCount">-</span><span class="stat-label">Groups</span></div></div>
            <div class="col-4"><div class="stat-card"><span class="stat-num text-success" id="todayColl">₹0</span><span class="stat-label">Today</span></div></div>
        </div>

        <div id="adminActionBtns" class="mt-4">
            <button class="btn btn-warning w-100 py-3 fw-bold shadow" onclick="openPaymentModal()" style="border-radius:20px;">💳 Record Payment</button>
        </div>

        <div id="adminMemberSearch" class="p-3 my-3" style="background:var(--card-bg);border-radius:20px;border:1px solid var(--border); position: relative;">
            <input type="text" id="summarySearch" class="form-input" placeholder="🔍 Search Member Ledger..." oninput="filterSearch('summarySearch','summaryList','summaryView')">
            <input type="hidden" id="summaryView">
            <div id="summaryList" class="suggestions-list"></div>
            <div id="ledgerData" class="mt-3"></div>
        </div>

        <div id="memberLedgerArea" style="display:none;margin-top:12px;">
            <div id="memberLedgerData"></div>
        </div>

        <div id="adminQuickBtns" class="d-flex gap-2">
            <button class="btn btn-outline-warning w-100 py-3 fw-bold" onclick="openAddMember()">👤 Create Member</button>
            <button class="btn btn-outline-success w-100 py-3 fw-bold" onclick="openAddGroup()">🏦 New Group</button>
        </div>
    </div>

    <div id="groupsTab" class="tab-content"><div id="groupListArea" class="mt-2"></div></div>

    <div id="backupTab" class="tab-content">
        <h5 class="mt-4 mb-3 text-warning text-center">💾 Data Management</h5>
        <div class="stat-card p-4">
            <button class="btn btn-warning w-100 py-3 mb-2 fw-bold" onclick="exportFullBackup()">💾 Download JSON Backup</button>
            <button class="btn btn-success w-100 py-3 mb-3 fw-bold" onclick="exportToExcel()">📊 Export to Excel (.xlsx)</button>
        </div>
    </div>
</div>

<div class="nav-bar" id="bottomNav">
    <div class="nav-item active" id="navHome" onclick="switchTab('home')">🏠<br>Home</div>
    <div class="nav-item" id="navGroups" onclick="switchTab('groups')">📁<br>Groups</div>
    <div class="nav-item" id="navBackup" onclick="switchTab('backup')">💾<br>Backup</div>
</div>

<script>
const firebaseConfig={apiKey:"AIzaSyCqb7gAbpa3UabPU3g_YhNITuPWtWPY4KU",authDomain:"ak-events-2016.firebaseapp.com",projectId:"ak-events-2016",storageBucket:"ak-events-2016.firebasestorage.app",messagingSenderId:"78066764444",appId:"1:78066764444:web:5bb9e0d48c128a8632fb59"};
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();
const ADMIN_PHONE = '8121723153';
let CURRENT_USER = null;
let ALL_MEMBERS = [];
const _dbCache = {};

async function initAuth(){
    const saved = sessionStorage.getItem('akdf_session');
    if(saved){
        try {
            const u = JSON.parse(saved);
            CURRENT_USER = u;
            applyUserSession(u);
            return;
        } catch(e) { sessionStorage.removeItem('akdf_session'); }
    }
    document.getElementById('loginScreen').style.display='flex';
}

async function handleLoginSubmit(){
    const phone = document.getElementById('loginPhone').value.trim();
    if(phone.length !== 10) return alert('Enter valid 10-digit number');
    
    if(phone === ADMIN_PHONE){
        const user = {phone, role:'admin', name:'Admin'};
        CURRENT_USER = user;
        sessionStorage.setItem('akdf_session', JSON.stringify(user));
        applyUserSession(user);
        return;
    }

    const members = await getCollection('members');
    const matched = members.find(m => (m.phone||'').replace(/\D/g,'').slice(-10) === phone);

    if(matched){
        const reqs = await db.collection('accessRequests').where('phone','==',phone).get();
        if(!reqs.empty){
            const req = reqs.docs[0].data();
            if(req.status === 'approved'){
                const user = {phone, role:'member', memberId: matched.id, name: matched.name};
                CURRENT_USER = user;
                sessionStorage.setItem('akdf_session', JSON.stringify(user));
                applyUserSession(user);
            } else {
                document.getElementById('pendingPhone').textContent = `+91 ${phone}`;
                document.getElementById('loginStep1').style.display='none';
                document.getElementById('loginStep2').style.display='block';
            }
        } else {
            await db.collection('accessRequests').add({ phone, name: matched.name, memberId: matched.id, status: 'pending', requestedAt: new Date().toISOString() });
            document.getElementById('pendingPhone').textContent = `+91 ${phone}`;
            document.getElementById('loginStep1').style.display='none';
            document.getElementById('loginStep2').style.display='block';
        }
    } else { alert('Number not registered. Contact admin.'); }
}

function applyUserSession(user){
    document.getElementById('loginScreen').style.display='none';
    if(user.role === 'admin'){
        document.getElementById('adminHeader').style.display='flex';
        document.getElementById('memberHeader').style.display='none';
        document.getElementById('bottomNav').style.display='flex';
        updateUI();
        pollPendingRequests();
    } else {
        document.getElementById('adminHeader').style.display='none';
        document.getElementById('memberHeader').style.display='block';
        document.getElementById('adminStatCards').style.display='none';
        document.getElementById('adminActionBtns').style.display='none';
        document.getElementById('adminMemberSearch').style.display='none';
        document.getElementById('adminQuickBtns').style.display='none';
        document.getElementById('bottomNav').style.display='none';
        document.getElementById('memberLedgerArea').style.display='block';
        document.getElementById('memberHeaderName').textContent = user.name;
        document.getElementById('memberHeaderPhone').textContent = `📱 +91 ${user.phone}`;
        document.getElementById('memberHeaderAvatar').textContent = user.name[0];
        document.getElementById('summaryView').value = user.memberId;
        loadMemberLedger();
    }
}

function handleLogout(){
    sessionStorage.removeItem('akdf_session');
    location.reload();
}

async function getCollection(col){
    const s = await db.collection(col).get();
    return s.docs.map(d=>({id:d.id,...d.data()}));
}

function switchTab(t){
    document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(i=>i.classList.remove('active'));
    document.getElementById(t+'Tab').classList.add('active');
    document.getElementById('nav'+t.charAt(0).toUpperCase()+t.slice(1)).classList.add('active');
    updateUI();
}

async function updateUI(){
    const m = await getCollection('members');
    const g = await getCollection('groups');
    const p = await getCollection('payments');
    ALL_MEMBERS = m;
    if(CURRENT_USER.role === 'admin'){
        document.getElementById('memberCount').innerText=m.length;
        document.getElementById('groupCount').innerText=g.length;
        const today=new Date().toISOString().split('T')[0];
        const todayAmt = p.filter(x=>x.date===today).reduce((s,x)=>s+(parseFloat(x.paid)||0),0);
        document.getElementById('todayColl').innerText='₹' + todayAmt.toLocaleString('en-IN');
        if(document.getElementById('groupsTab').classList.contains('active')) renderGroupsTab();
    }
}

async function pollPendingRequests(){
    const snap = await db.collection('accessRequests').where('status','==','pending').get();
    const count = snap.docs.length;
    const badge = document.getElementById('pendingCount');
    if(count > 0){
        badge.style.display='flex';
        badge.textContent=count;
    } else { badge.style.display='none'; }
}

// LOGO PRINT INTEGRATION
async function printMemberStatement(mid){
    const ms=await getCollection('members');
    const gs=await getCollection('groups');
    const ps=await getCollection('payments');
    const m=ms.find(x=>x.id===mid);
    const today=new Date().toLocaleDateString('en-IN');
    const printHTML = `
    <div style="padding:20px; font-family:Arial;">
        <div style="display:flex; align-items:center; justify-content:space-between; border-bottom:2px solid #f39c12; padding-bottom:10px;">
            <div style="display:flex; align-items:center; gap:15px;">
                <img src="logo.png" style="height:60px;" onerror="this.style.display='none'">
                <div>
                    <h2 style="margin:0; color:#f39c12;">AK CHIT FUNDS</h2>
                    <small>Member Statement</small>
                </div>
            </div>
            <div style="text-align:right;">Generated: ${today}</div>
        </div>
        <h4 style="margin-top:20px;">Customer: ${m.name}</h4>
        <p>Phone: ${m.phone}</p>
        </div>`;
    let ov = document.createElement('div');
    ov.id = 'printOverlay';
    ov.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:white;z-index:99999;overflow-y:auto;';
    ov.innerHTML = `<button onclick="window.print()" style="margin:10px;">Print</button><button onclick="this.parentElement.remove()">Close</button>` + printHTML;
    document.body.appendChild(ov);
}

document.addEventListener('DOMContentLoaded', () => {
    initAuth();
    setInterval(() => { if(CURRENT_USER && CURRENT_USER.role==='admin') pollPendingRequests(); }, 5000);
});
</script>
</body>
</html>
