<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AK Chit Funds - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
    <div id="loginScreen" style="position:fixed; inset:0; background:var(--bg-dark); z-index:9999; display:flex; align-items:center; justify-content:center;">
        <div class="p-5 text-center" style="background:var(--card-bg); border-radius:20px;">
            <div class="brand-logo">🏆</div>
            <h2 class="text-warning">AK Chit Funds</h2>
            <button class="btn-save mt-4" onclick="handleLoginSubmit()">🔐 Login</button>
        </div>
    </div>

    <div class="app-header">
        <div class="brand"><div class="brand-logo">🏆</div><span>AK CHIT FUNDS</span></div>
    </div>

    <div id="homeTab" class="tab-content active p-3">
        <div class="mt-2"><input type="text" class="form-input" placeholder="🔍 Global Search Member..."></div>
        <div class="d-flex gap-2 mb-4">
            <button class="btn btn-warning w-50" onclick="alert('Add Member Flow')">+ New Member</button>
            <button class="btn btn-outline-warning w-50" onclick="alert('Add Group Flow')">+ New Group</button>
        </div>
        <div class="row g-2 text-center">
            <div class="col-6"><div class="p-3 bg-dark border rounded">Members: <span id="mCount">0</span></div></div>
            <div class="col-6"><div class="p-3 bg-dark border rounded">Groups: <span id="gCount">0</span></div></div>
        </div>
    </div>

    <div id="listTab" class="tab-content p-3">
        <div class="p-3 bg-dark rounded border border-secondary">
            <h6 class="text-warning mb-3">📋 Advanced Chit Planner</h6>
            <input type="number" id="ncp_amount" class="form-input" placeholder="Chit Value (e.g. 100000)">
            <input type="number" id="ncp_members" class="form-input" placeholder="Total Members">
            <input type="number" id="ncp_duration" class="form-input" placeholder="Duration (Months)">
            <button class="btn-save" onclick="ncpCalculateAdvanced()">⚡ Generate Detailed Schedule</button>
            
            <div id="ncp_result_area" class="mt-3 overflow-auto"></div>
            <button id="btnPrint" class="btn btn-outline-light w-100 mt-2" onclick="window.print()" style="display:none;">🖨️ Print Detailed PDF</button>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="switchTab('home')">🏠<br>Home</div>
        <div class="nav-item" onclick="switchTab('list')">📜<br>Planner</div>
    </div>

    <script src="app.js"></script>
    <script src="planner.js"></script>
</body>
</html>
