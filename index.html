<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>AK Chit Funds - Portal v5.0</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --bg-dark:#0a0e1a; --card-bg:#141b2d; --input-bg:#1c253b; --accent-gold:linear-gradient(90deg,#ff9800,#f57c00); --text-main:#ffffff; --text-dim:#8e9aaf; --border:#252f48; }
        * { box-sizing:border-box; }
        body { background-color:var(--bg-dark); color:var(--text-main); font-family:'Segoe UI',sans-serif; padding-bottom:120px; }
        .app-header { display:flex; justify-content:space-between; align-items:center; padding:12px 20px; border-bottom:1px solid var(--border); background:var(--card-bg); }
        .brand { color:#f39c12; font-weight:bold; font-size:1.3rem; }
        .stat-card { background:var(--card-bg); border:1px solid var(--border); border-radius:15px; padding:15px; text-align:center; }
        .stat-num { font-size:1.3rem; font-weight:bold; display:block; }
        .stat-label { font-size:0.65rem; color:var(--text-dim); text-transform:uppercase; }
        .modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.92); z-index:2000; padding:20px; overflow-y:auto; }
        .modal-content-custom { background:var(--card-bg); border-radius:25px; padding:25px; max-width:450px; margin:20px auto; border:1px solid var(--border); }
        .form-input { background:var(--input-bg); border:1px solid var(--border); color:white; padding:12px; border-radius:12px; width:100%; margin-bottom:12px; font-size:0.9rem; }
        .nav-bar { position:fixed; bottom:0; width:100%; background:#070b14; display:flex; justify-content:space-around; padding:12px 0; border-top:1px solid var(--border); z-index:1000; }
        .nav-item { cursor:pointer; text-align:center; font-size:0.65rem; color:var(--text-dim); }
        .nav-item.active { color:#f39c12; font-weight:bold; }
        .tab-content { display:none; } .tab-content.active { display:block; }
        .table-custom { color:white; font-size:0.7rem; width:100%; border-collapse:collapse; }
        .table-custom th { color:var(--text-dim); border-bottom:1px solid var(--border); padding:8px 5px; text-transform:uppercase; }
        .table-custom td { padding:9px 5px; border-bottom:1px solid rgba(255,255,255,0.05); }
        .suggestions-list { position:absolute; top:100%; left:0; right:0; background:var(--input-bg); border:1px solid var(--border); z-index:3000; max-height:200px; overflow-y:auto; display:none; }
        .suggestion-item { padding:12px; cursor:pointer; border-bottom:1px solid rgba(255,255,255,0.05); }
        #loginScreen { position:fixed; inset:0; background:var(--bg-dark); z-index:9000; display:flex; align-items:center; justify-content:center; padding:20px; }
        .login-card { background:var(--card-bg); border:1px solid var(--border); border-radius:28px; padding:32px; width:100%; max-width:400px; text-align:center; }
        .chit-picked { background: rgba(16,185,129,0.1); border-left: 3px solid #10b981; }
    </style>
</head>
<body>

<div id="loginScreen">
    <div class="login-card">
        <img src="logo.png" style="width: 120px; height: auto; margin-bottom: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);" onerror="this.src='https://via.placeholder.com/120?text=AK'">
        <div style="font-size:1.6rem; font-weight:900; color:#f39c12;">AK Chit Funds</div>
        <div style="font-size:0.75rem; color:var(--text-dim); margin-bottom:20px;">Portal Login</div>
        <div style="display:flex; gap:8px;">
            <span style="background:var(--input-bg); border:1px solid var(--border); color:var(--text-dim); padding:12px; border-radius:12px;">+91</span>
            <input type="tel" id="loginPhone" class="form-input" style="margin-bottom:0;" placeholder="0987654321" maxlength="10">
        </div>
        <button class="btn btn-warning w-100 py-3 mt-3 fw-bold" onclick="handleLoginSubmit()">🔐 Access Portal</button>
    </div>
</div>

<div class="container py-2">
    <div id="adminHeader" class="app-header">
        <div style="display: flex; align-items: center;">
            <img src="logo.png" style="height: 80px; width: auto; margin-right: 12px; border-radius: 5px;" onerror="this.style.display='none'">
            <div class="brand">AK Chit Funds <small style="font-size:0.5em;color:#2ecc71;">☁ CLOUD</small></div>
        </div>
        <button id="logoutBtn" onclick="handleLogout()" class="btn btn-sm btn-outline-danger">Logout</button>
    </div>

    <div id="homeTab" class="tab-content active">
        <div class="row g-2 mt-3 text-center" id="adminStats">
            <div class="col-4"><div class="stat-card"><span class="stat-num" id="memberCount">0</span><span class="stat-label">Members</span></div></div>
            <div class="col-4"><div class="stat-card"><span class="stat-num" id="groupCount">0</span><span class="stat-label">Groups</span></div></div>
            <div class="col-4"><div class="stat-card"><span class="stat-num text-success" id="todayColl">₹0</span><span class="stat-label">Today</span></div></div>
        </div>

        <div id="adminActionBtns" class="mt-4">
            <button class="btn btn-warning w-100 py-3 fw-bold shadow" onclick="openPaymentModal()" style="border-radius:20px;">💳 Record Payment</button>
        </div>

        <div id="ledgerContainer" class="p-3 my-3" style="background:var(--card-bg); border-radius:20px; border:1px solid var(--border); position: relative;">
            <input type="text" id="summarySearch" class="form-input" placeholder="🔍 Search Member Ledger..." oninput="filterSearch(this.value)">
            <div id="summaryList" class="suggestions-list"></div>
            <div id="ledgerData" class="mt-3"></div>
        </div>

        <div class="d-flex gap-2" id="adminQuickBtns">
            <button class="btn btn-outline-warning w-100 py-3" onclick="openAddMember()">👤 Create Member</button>
            <button class="btn btn-outline-success w-100 py-3" onclick="openAddGroup()">🏦 New Group</button>
        </div>
    </div>

    <div id="groupsTab" class="tab-content">
        <div id="groupListArea" class="mt-3 p-2"></div>
    </div>

    <div id="backupTab" class="tab-content">
        <div class="stat-card p-4 mt-5">
            <button class="btn btn-warning w-100 py-3 mb-2" onclick="exportFullBackup()">💾 Backup JSON</button>
            <button class="btn btn-success w-100 py-3" onclick="exportToExcel()">📊 Export Excel</button>
        </div>
    </div>
</div>

<div class="nav-bar" id="footerNav">
    <div class="nav-item active" id="navHome" onclick="switchTab('home', this)">🏠<br>Home</div>
    <div class="nav-item" id="navGroups" onclick="switchTab('groups', this)">📁<br>Groups</div>
    <div class="nav-item" id="navBackup" onclick="switchTab('backup', this)">💾<br>Backup</div>
</div>

<div id="payModal" class="modal-overlay">
    <div class="modal-content-custom">
        <h5>Record Payment</h5>
        <input type="date" id="pDate" class="form-input">
        <select id="pMember" class="form-input" onchange="updateGroupDrop()"></select>
        <select id="pGroup" class="form-input"></select>
        <input type="number" id="pAmt" class="form-input" placeholder="Amount ₹">
        <select id="pPicked" class="form-input"><option value="No">Picked: No</option><option value="Yes">Picked: Yes ✅</option></select>
        <button class="btn-save w-100" onclick="savePayment()">Sync Payment</button>
        <button class="btn-cancel w-100" onclick="closeModal('payModal')">Cancel</button>
    </div>
</div>

<script>
const firebaseConfig={apiKey:"AIzaSyCqb7gAbpa3UabPU3g_YhNITuPWtWPY4KU",authDomain:"ak-events-2016.firebaseapp.com",projectId:"ak-events-2016",appId:"1:78066764444:web:5bb9e0d48c128a8632fb59"};
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();
const ADMIN_PHONE = '0987654321';
let CURRENT_USER = null;
let _cache = { m: [], g: [], p: [] };

async function sync() {
    const [m, g, p] = await Promise.all([
        db.collection('members').get(),
        db.collection('groups').get(),
        db.collection('payments').get()
    ]);
    _cache.m = m.docs.map(d=>({id:d.id,...d.data()}));
    _cache.g = g.docs.map(d=>({id:d.id,...d.data()}));
    _cache.p = p.docs.map(d=>({id:d.id,...d.data()}));
    updateUI();
}

function initAuth() {
    const saved = sessionStorage.getItem('akdf_session');
    if(saved) applyUserSession(JSON.parse(saved));
    else document.getElementById('loginScreen').style.display = 'flex';
}

function applyUserSession(user) {
    CURRENT_USER = user;
    document.getElementById('loginScreen').style.display = 'none';
    sync();
}

async function handleLoginSubmit() {
    const phone = document.getElementById('loginPhone').value.trim();
    if(phone === ADMIN_PHONE) {
        const user = {phone, role:'admin', name:'Admin'};
        sessionStorage.setItem('akdf_session', JSON.stringify(user));
        applyUserSession(user);
    } else {
        const members = await db.collection('members').get();
        const matched = members.docs.find(d => d.data().phone === phone);
        if(matched) {
            const user = {phone, role:'member', name: matched.data().name, id: matched.id};
            sessionStorage.setItem('akdf_session', JSON.stringify(user));
            applyUserSession(user);
        } else { alert("Login failed. Check number."); }
    }
}

function updateUI() {
    document.getElementById('memberCount').innerText = _cache.m.length;
    document.getElementById('groupCount').innerText = _cache.g.length;
    renderGroups();
}

function renderGroups() {
    const area = document.getElementById('groupListArea');
    area.innerHTML = _cache.g.map(g => {
        const mms = _cache.m.filter(m => m.groupId === g.id);
        return `<div class="group-card">
            <h6 style="color:#f39c12">📂 ${g.name}</h6>
            <small class="text-dim">${mms.length} members enrolled</small>
            <div class="mt-2" style="font-size:0.75rem">
                ${mms.map(m => `• ${m.name}`).join('<br>')}
            </div>
        </div>`;
    }).join('');
}

function filterSearch(val) {
    const list = document.getElementById('summaryList');
    if(!val) { list.style.display='none'; return; }
    const filtered = _cache.m.filter(m => m.name.toLowerCase().includes(val.toLowerCase()));
    list.innerHTML = filtered.map(m => `<div class="suggestion-item" onclick="selectMember('${m.id}','${m.name}')">${m.name}</div>`).join('');
    list.style.display = 'block';
}

function selectMember(id, name) {
    document.getElementById('summarySearch').value = name;
    document.getElementById('summaryList').style.display = 'none';
    const mp = _cache.p.filter(p => p.memberId === id);
    document.getElementById('ledgerData').innerHTML = `
        <div class="stat-card">
            <h6>${name} Ledger</h6>
            <table class="table-custom w-100">
                <thead><tr><th>Date</th><th>Amount</th><th>Picked</th></tr></thead>
                <tbody>${mp.map(p=>`<tr><td>${p.date}</td><td class="text-success">₹${p.amt}</td><td>${p.picked||'No'}</td></tr>`).join('')}</tbody>
            </table>
        </div>`;
}

function openPaymentModal() {
    const memDrop = document.getElementById('pMember');
    memDrop.innerHTML = '<option value="">Select Member</option>' + _cache.m.map(m=>`<option value="${m.id}">${m.name}</option>`).join('');
    document.getElementById('pDate').value = new Date().toISOString().split('T')[0];
    document.getElementById('payModal').style.display = 'block';
}

function updateGroupDrop() {
    const mid = document.getElementById('pMember').value;
    const member = _cache.m.find(m => m.id === mid);
    const gDrop = document.getElementById('pGroup');
    const group = _cache.g.find(g => g.id === member.groupId);
    gDrop.innerHTML = group ? `<option value="${group.id}">${group.name}</option>` : '<option>No Group</option>';
}

async function savePayment() {
    const data = {
        memberId: document.getElementById('pMember').value,
        groupId: document.getElementById('pGroup').value,
        amt: document.getElementById('pAmt').value,
        date: document.getElementById('pDate').value,
        picked: document.getElementById('pPicked').value
    };
    await db.collection('payments').add(data);
    closeModal('payModal');
    sync();
}

function switchTab(t, el) {
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    document.getElementById(t+'Tab').classList.add('active');
    el.classList.add('active');
}

function handleLogout() { sessionStorage.clear(); location.reload(); }
function closeModal(id) { document.getElementById(id).style.display = 'none'; }

document.addEventListener('DOMContentLoaded', initAuth);
</script>
</body>
</html>
