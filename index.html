<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AK Chit Funds - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
    <div id="loginScreen" class="modal-overlay" style="position:fixed; inset:0; background:var(--bg-dark); z-index:9999; display:flex; align-items:center; justify-content:center;">
        <div class="p-5 text-center" style="background:var(--card-bg); border-radius:20px;">
            <div class="brand-logo">🏆</div>
            <h2 class="text-warning">AK Chit Funds</h2>
            <button class="btn-save mt-4" onclick="handleLoginSubmit()">🔐 Login</button>
        </div>
    </div>

    <div class="app-header">
        <div class="brand"><div class="brand-logo">🏆</div><span>AK CHIT FUNDS</span></div>
    </div>

    <div id="homeTab" class="tab-content active p-3">
        <div class="row g-2 text-center">
            <div class="col-6"><div class="p-3 bg-dark border border-secondary rounded">Members: <span id="mCount">0</span></div></div>
            <div class="col-6"><div class="p-3 bg-dark border border-secondary rounded">Groups: <span id="gCount">0</span></div></div>
        </div>
    </div>

    <div id="listTab" class="tab-content p-3">
        <div class="p-3 bg-dark rounded">
            <input type="number" id="ncp_amount" class="form-input" placeholder="Amount">
            <input type="number" id="ncp_members" class="form-input" placeholder="Members">
            <button class="btn-save" onclick="ncpCalculateFull()">⚡ Generate</button>
            <div id="ncp_result_area"></div>
            <button id="btnPrint" class="btn btn-outline-light w-100 mt-2" onclick="ncpPrint()" style="display:none;">🖨️ Print</button>
        </div>
    </div>

    <div id="printOverlay"></div>

    <div class="nav-bar">
        <div class="nav-item active" id="navHome" onclick="switchTab('home')">🏠<br>Home</div>
        <div class="nav-item" id="navList" onclick="switchTab('list')">📜<br>Planner</div>
    </div>

    <script src="app.js"></script>
    <script src="planner.js"></script>
</body>
</html>
